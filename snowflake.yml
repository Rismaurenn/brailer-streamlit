# ═══════════════════════════════════════════════════════════════
# Snowflake Native Apps - Streamlit in Snowflake (SiS)
# ═══════════════════════════════════════════════════════════════
# CATATAN PENTING:
# Streamlit in Snowflake (SiS) memiliki KETERBATASAN:
# - Tidak bisa install system packages (apt-get)
# - opencv-python-headless membutuhkan libGL.so.1 yang TIDAK tersedia
# - Untuk app dengan OpenCV/TensorFlow/PyTorch, gunakan
#   Snowflake Container Services sebagai alternatif
# ═══════════════════════════════════════════════════════════════

definition_version: 1

entities:
  braille_to_latin:
    name: braille_to_latin
    description: >
      Sistem bantu baca Braille yang menggunakan YOLO untuk deteksi
      dan CNN untuk klasifikasi karakter Braille.
    artifacts:
      - path: ./
    configuration:
      streamlit:
        main_file: app.py
        title: "Terjemah Braille ke Latin"
        warehouse: COMPUTE_WH

package:
  name: braille_to_latin_package
  distribution: internal
  permissions:
    - ACCOUNT USAGE
